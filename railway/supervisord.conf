[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[group:temporal]
programs=casdoor,temporal,ui

[program:casdoor]
command=/opt/casdoor/casdoor-server
directory=/opt/casdoor
user=temporal
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/temporal"

[program:temporal]
command=/opt/temporal/start.sh server
directory=/opt/temporal
user=temporal
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=5
startretries=10

[program:ui]
command=/opt/ui-server/start.sh
directory=/opt/ui-server
user=temporal
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=5
startretries=10
