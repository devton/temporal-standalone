# Temporal Standalone - Railway Compose
# Adapted for Railway's docker-compose deployment
# 
# Railway differences from local docker-compose:
# - PostgreSQL uses Railway's built-in plugin (DATABASE_URL)
# - No depends_on with healthchecks — services must wait internally
# - Service URLs use Railway's internal DNS (${RAILWAY_SERVICE_NAME}.railway.internal)
# - Build context includes submodule init
#
# Required Railway Variables (set in Railway dashboard):
#   TEMPORAL_HOST        - Your public domain (e.g., temporal.yourdomain.com)
#   JWT_SECRET           - Secret for API key signing
#   CASDOOR_CLIENT_ID    - Casdoor application client ID (or use auto-seed default)
#   CASDOOR_CLIENT_SECRET - Casdoor application client secret (or use auto-seed default)
#   POSTGRES_PASSWORD    - Auto-provided by Railway PostgreSQL plugin

services:
  # ============================================
  # Casdoor - OIDC Identity Provider
  # Includes wait-for-postgres and auto-seed
  # ============================================
  casdoor:
    build:
      context: ./docker/casdoor
      dockerfile: Dockerfile
    environment:
      - RUNNING_IN_DOCKER=true
      - driverName=postgres
      - dataSourceName=user=casdoor password=${CASDOOR_DB_PASSWORD:-casdoor_secret} host=${PGHOST} port=${PGPORT:-5432} sslmode=disable dbname=casdoor
      - appName=temporal
      - redisEndpoint=
      - isDemoMode=false
      - enableGzip=true
      - origin=${CASDOOR_ORIGIN:-http://localhost:8000}
      # Auto-seed config
      - TEMPORAL_UI_CALLBACK=${TEMPORAL_UI_CALLBACK:-http://localhost:8080/auth/sso/callback}
      - CASDOOR_ADMIN_PASSWORD=${CASDOOR_ADMIN_PASSWORD:-Temporal123!}
    ports:
      - "8000:8000"

  # ============================================
  # Temporal Server with Auto-Setup
  # auto-setup runs schema migration on first boot, then starts server
  # Uses PostgreSQL plugin connection
  # ============================================
  temporal:
    build:
      context: ./docker/temporal
      dockerfile: Dockerfile
    environment:
      - DB=postgres12
      - DB_PORT=${PGPORT:-5432}
      - DBNAME=temporal
      - POSTGRES_USER=${PGUSER:-temporal}
      - POSTGRES_PWD=${PGPASSWORD}
      - POSTGRES_SEEDS=${PGHOST}
      - VISIBILITY_DB=postgres12
      - VISIBILITY_DB_PORT=${PGPORT:-5432}
      - VISIBILITY_POSTGRES_USER=${PGUSER:-temporal}
      - VISIBILITY_POSTGRES_PWD=${PGPASSWORD}
      - VISIBILITY_POSTGRES_SEEDS=${PGHOST}
      - VISIBILITY_DBNAME=temporal_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
      - TEMPORAL_JWT_KEY_SOURCE1=http://casdoor:8000/.well-known/jwks
    ports:
      - "7233:7233"

  # ============================================
  # Temporal Setup - One-shot namespace config
  # Waits for server healthy, then configures namespaces
  # ============================================
  temporal-setup:
    build:
      context: ./docker/setup
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233

  # ============================================
  # Temporal UI (Custom with API Keys)
  # Builds from upstream + overlays with submodule init
  # ============================================
  temporal-ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
      submodules: true
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost}
      - TEMPORAL_CORS_ORIGINS=http://${TEMPORAL_HOST:-localhost}:8080
      - TEMPORAL_OIDC_ISSUER_URL=http://casdoor:8000
      - TEMPORAL_OIDC_CLIENT_ID=${CASDOOR_CLIENT_ID:-temporal-ui}
      - TEMPORAL_OIDC_CLIENT_SECRET=${CASDOOR_CLIENT_SECRET:-temporal-ui-secret}
      - TEMPORAL_OIDC_CALLBACK_URL=http://${TEMPORAL_HOST:-localhost}:8080/auth/sso/callback
      - CASDOOR_CLIENT_ID=${CASDOOR_CLIENT_ID:-temporal-ui}
      - CASDOOR_CLIENT_SECRET=${CASDOOR_CLIENT_SECRET:-temporal-ui-secret}
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
    ports:
      - "8080:8080"
