# Docker Compose Override - Custom Temporal UI with API Keys
# Usage: docker compose up -d (automatically merges with docker-compose.yml)

services:
  temporal-ui:
    build:
      context: ./ui-custom
      dockerfile: Dockerfile.custom
    image: temporal-ui-custom:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      # Host configuration (from .env)
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost}
      - TEMPORAL_UI_PORT=${TEMPORAL_UI_PORT:-8080}
      - CASDOOR_PORT=${CASDOOR_PORT:-8000}
      # OIDC Configuration
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-8269b3a04ee85269e59c}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-1ef7a535169058cfa0f65960036a959b390f1447}
    volumes:
      # Persist API keys store (optional, for production use database)
      - api_keys_data:/home/ui-server/data:rw
    networks:
      - temporal-network

volumes:
  api_keys_data:
