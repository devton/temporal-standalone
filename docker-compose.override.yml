# Docker Compose Override - Custom Temporal UI with API Keys
# Usage: docker compose up -d (automatically merges with docker-compose.yml)

services:
  temporal-ui:
    build:
      context: ./ui-custom
      dockerfile: Dockerfile.custom
    image: temporal-ui-custom:latest
    # Override volumes - remove the config mount so our built-in template is used
    volumes: []
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      # Host configuration (from .env) - for browser redirects
      - TEMPORAL_HOST=${TEMPORAL_HOST:-localhost}
      # OIDC Configuration (passed to config template)
      - CASDOOR_CLIENT_ID=${CASDOOR_CLIENT_ID}
      - CASDOOR_CLIENT_SECRET=${CASDOOR_CLIENT_SECRET}
      # JWT secret for API key signing
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
    networks:
      - temporal-network
