# Dynamic Configuration for Temporal
# This file controls feature flags and system limits

# Archive configuration
history.archivalEnabled:
  - value: true
    constraints: {}

visibility.archivalEnabled:
  - value: true
    constraints: {}

# Namespace retention default (30 days = 2592000 seconds)
namespace.defaultRetention:
  - value: 2592000s
    constraints: {}

# Frontend settings
frontend.enableUpdateWorkflowExecution:
  - value: true
    constraints: {}

frontend.enableUpdateWorkflowExecutionAsyncAccepted:
  - value: true
    constraints: {}

# Standalone Activities (Public Preview, v1.31+)
activity.enableStandalone:
  - value: true
    constraints:
      namespace: "default"
  - value: true
    constraints:
      namespace: "3b6ae4b6-3dc9-4321-89be-f83a0427d3e9"

# System limits
limit.history.maxPageSize:
  - value: 10000
    constraints: {}

limit.history.maxSearchAttributes:
  - value: 100
    constraints: {}
