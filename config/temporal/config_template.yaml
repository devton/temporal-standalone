global:
  membership:
    name: temporal
    maxJoinDuration: 30s
    broadcastAddress: "{{ .Env.BROADCAST_ADDRESS }}"
  pprof:
    port: 7933

log:
  stdout: true
  level: "info"

persistence:
  numHistoryShards: 4
  defaultStore: default
  visibilityStore: visibility
  datastores:
    default:
      sql:
        pluginName: "postgres12"
        databaseName: "{{ .Env.DBNAME }}"
        connectAddr: "{{ .Env.POSTGRES_SEEDS }}:{{ .Env.DB_PORT }}"
        connectProtocol: "tcp"
        user: "{{ .Env.POSTGRES_USER }}"
        password: "{{ .Env.POSTGRES_PWD }}"
        maxConns: 20
        maxIdleConns: 20
        maxConnLifetime: "1h"
    visibility:
      sql:
        pluginName: "postgres12"
        databaseName: "{{ .Env.VISIBILITY_DBNAME }}"
        connectAddr: "{{ .Env.VISIBILITY_POSTGRES_SEEDS }}:{{ .Env.VISIBILITY_DB_PORT }}"
        connectProtocol: "tcp"
        user: "{{ .Env.VISIBILITY_POSTGRES_USER }}"
        password: "{{ .Env.VISIBILITY_POSTGRES_PWD }}"
        maxConns: 20
        maxIdleConns: 20
        maxConnLifetime: "1h"

services:
  frontend:
    rpc:
      grpcPort: 7233
      membershipPort: 6933
      bindOnIP: "{{ .Env.BIND_ON_IP }}"
    reflector:
      grpcReflectionEnabled: true
  # Internal frontend WITHOUT auth — usado pelos serviços internos (history, matching, worker)
  internal-frontend:
    rpc:
      grpcPort: 7236
      membershipPort: 6940
      bindOnIP: "{{ .Env.BIND_ON_IP }}"
  history:
    rpc:
      grpcPort: 7234
      membershipPort: 6934
      bindOnIP: "{{ .Env.BIND_ON_IP }}"
  matching:
    rpc:
      grpcPort: 7235
      membershipPort: 6935
      bindOnIP: "{{ .Env.BIND_ON_IP }}"
  worker:
    rpc:
      grpcPort: 7239
      membershipPort: 6939
      bindOnIP: "{{ .Env.BIND_ON_IP }}"

clusterMetadata:
  enableGlobalNamespace: false
  failoverVersionIncrement: 10
  masterClusterName: "active"
  currentClusterName: "active"
  clusterInformation:
    active:
      enabled: true
      initialFailoverVersion: 0
      rpcName: "temporal"
      rpcAddress: "127.0.0.1:7933"
  namespaceDefaults:
    .local:
      replication:
        type: Local
        activeClusterName: "active"
    global:
      replication:
        type: Global
        activeClusterName: "active"

dcRedirectionPolicy:
  policy: "noop"

archival:
  history:
    state: "disabled"
    enableRead: false
  visibility:
    state: "disabled"
    enableRead: false

namespaceDefaults:
  archival:
    history:
      state: "disabled"
    visibility:
      state: "disabled"

# Authentication: validate JWT from Casdoor AND our UI server (API keys)
authentication:
  jwtKeyProvider:
    keySourceURIs:
      - "{{ .Env.JWT_KEY_SOURCE1 }}"
      - "http://temporal-ui:8080/.well-known/jwks.json"
    refreshInterval: "1m"

# Authorization: namespace-level scoping via JWT claims
authorization:
  authorizer: "default"
  claimMapper: "default"
  permissionsClaimName: "permissions"
  jwtKeyProvider:
    keySourceURIs:
      - "{{ .Env.JWT_KEY_SOURCE1 }}"
      - "http://temporal-ui:8080/.well-known/jwks.json"
    refreshInterval: "1m"

dynamicConfigClient:
  filepath: "/etc/temporal/config/dynamicconfig/docker.yaml"
  pollInterval: "10s"
