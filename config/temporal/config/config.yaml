# Temporal Server Configuration

persistence:
  defaultStore: default
  visibilityStore: visibility
  
  datastores:
    default:
      sql:
        driver: postgres12
        host: postgresql
        port: 5432
        database: temporal
        user: temporal
        password: temporal
        connectAttributes:
          search_path: temporal
        
    visibility:
      sql:
        driver: postgres12
        host: postgresql
        port: 5432
        database: temporal
        user: temporal
        password: temporal
        connectAttributes:
          search_path: temporal_visibility

archival:
  history:
    state: enabled
    enableRead: true
    provider:
      filestore:
        fileMode: "0666"
        dirMode: "0777"
      s3:
        region: us-east-1
        endpoint: http://minio:9000
        s3ForcePathStyle: true
  visibility:
    state: enabled
    enableRead: true

namespace:
  defaultNamespaceRetentionDays: 30
  
clusterMetadata:
  enableGlobalNamespace: false
  failoverVersionIncrement: 10
  masterClusterName: active
  currentClusterName: active
  
  clusterInformation:
    active:
      enabled: true
      initialFailoverVersion: 1
      rpcName: temporal
      rpcAddress: temporal:7233

services:
  frontend:
    rpc:
      grpcPort: 7233
      membershipPort: 6933
      bindOnLocalHost: false
      
  matching:
    rpc:
      grpcPort: 7235
      membershipPort: 6935
      
  history:
    rpc:
      grpcPort: 7234
      membershipPort: 6934
      
  worker:
    rpc:
      grpcPort: 7239
      membershipPort: 6939

global:
  membership:
    name: temporal
    maxJoinDuration: 30s
    broadcastAddress: temporal
    
  pprof:
    port: 7936

logging:
  stdout: true
  level: info
