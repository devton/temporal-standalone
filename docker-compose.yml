  #     MINIO_ROOT_USER: temporal
  #     MINIO_ROOT_PASSWORD: temporal_archive_secret
  #   command: server /data --console-address ":9001"
  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - "0.0.0.0:9000:9000"
  #     - "0.0.0.0:9001:9001"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 20s
  #     retries: 3
  #   networks:
  #     - temporal-network
  #
  # minio-init:
  #   image: minio/mc:latest
  #   container_name: temporal-minio-init
