# Temporal Standalone
# PostgreSQL + Temporal Server + Temporal UI + MinIO (para archive)

version: "3.8"

services:
  # ============================================
  # PostgreSQL - Banco de dados principal
  # ============================================
  postgresql:
    image: postgres:15-alpine
    container_name: temporal-postgres
    hostname: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal_password}
      POSTGRES_DB: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - temporal-network

  # ============================================
  # MinIO - Object Storage para Archive
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: temporal-minio
    hostname: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-temporal}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-temporal_archive_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - temporal-network

  # Cria o bucket para archive
  minio-create-bucket:
    image: minio/mc:latest
    container_name: temporal-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_USER:-temporal} ${MINIO_PASSWORD:-temporal_archive_password};
      mc mb myminio/temporal-archive --ignore-existing;
      mc anonymous set public myminio/temporal-archive;
      exit 0;
      "
    networks:
      - temporal-network

  # ============================================
  # Temporal Server
  # ============================================
  temporal:
    image: temporalio/server:latest
    container_name: temporal-server
    hostname: temporal
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    environment:
      # Database
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-temporal_password}
      POSTGRES_SEEDS: postgresql
      
      # Retenção de 30 dias (em dias)
      HISTORY_RETENTION: "30"
      
      # Configurações do servidor
      LOG_LEVEL: info
      TEMPORAL_BROADCAST_ADDRESS: temporal
      
      # Configurações de archive
      TEMPORAL_CLI_ADDRESS: temporal:7233
      
      # Auth (configurado via dynamic config)
      # Ver config/dynamicconfig/development.yaml
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
      - ./config/config.yaml:/etc/temporal/config/config.yaml:ro
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - temporal-network

  # ============================================
  # Temporal Web UI
  # ============================================
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    hostname: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "*"
      
      # Autenticação JWT
      AUTH_ENABLED: "true"
      AUTH_PROVIDER_URL: ${AUTH_PROVIDER_URL:-}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET:-}
      AUTH_CALLBACK_URL: ${AUTH_CALLBACK_URL:-}
      
      # Para auth local simples (sem provider externo)
      # Use AUTH_TYPE=local para desenvolvimento
      AUTH_TYPE: ${AUTH_TYPE:-local}
      
      # Scope para autorização
      AUTH_SCOPES: ${AUTH_SCOPES:-openid email profile}
      
      # Configurações de refresh
      TEMPORAL_UI_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  # ============================================
  # Temporal Admin Tools (opcional - CLI)
  # ============================================
  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: temporal-admin-tools
    hostname: temporal-admin
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true
    networks:
      - temporal-network
    profiles:
      - admin

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  temporal-network:
    driver: bridge
