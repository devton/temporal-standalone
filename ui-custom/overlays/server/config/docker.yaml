# enable-template
# Temporal UI Config - OIDC via environment variables

temporalGrpcAddress: temporal:7233
port: 8080
enableUi: true
cloudUi: false
defaultNamespace: default
cors:
  cookieInsecure: true
  unsafeAllowAllOrigins: false
  allowOrigins:
    - "http://{{ env "TEMPORAL_HOST" }}:8080"
    - "http://localhost:8080"
tls:
  enableHostVerification: false
auth:
  enabled: true
  providers:
  - label: sso
    type: oidc
    providerUrl: http://casdoor:8000
    issuerUrl: http://{{ env "TEMPORAL_HOST" }}:8000
    clientId: {{ env "CASDOOR_CLIENT_ID" }}
    clientSecret: {{ env "CASDOOR_CLIENT_SECRET" }}
    callbackUrl: http://{{ env "TEMPORAL_HOST" }}:8080/auth/sso/callback
    useIdTokenAsBearer: true
    scopes:
      - openid
      - profile
      - email
hideLogs: false
